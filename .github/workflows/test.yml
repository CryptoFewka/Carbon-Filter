name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: node --test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # No install step: the test suite has zero dependencies.
      - run: node --test

  wrangler-dry-run:
    name: wrangler config + bundle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx wrangler deploy --dry-run --outdir dist --env ""
